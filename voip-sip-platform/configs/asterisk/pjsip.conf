[global]
type=global
user_agent=Asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5062
external_media_address=13.220.116.58
external_signaling_address=13.220.116.58
local_net=172.31.0.0/16

[kamailio]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
aors=kamailio-aor
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
transport=transport-udp

[kamailio-aor]
type=aor
max_contacts=1

[identify-kamailio]
type=identify
endpoint=kamailio
match=172.31.27.128

[3003]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
auth=3003
aors=3003
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes

[3003]
type=auth
auth_type=userpass
password=agent3003
username=3003

[3003]
type=aor
max_contacts=1

